<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, interactive-widget=resizes-content">
<script src="app/main.mjs" type="module"></script>
<title>Remote Touchpad</title>
<link href="main.css" media="screen" rel="stylesheet">
<link href="icon.png" type="image/png" rel="icon">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<div id="opening" class="scene">
    <noscript><p>JavaScript is required!</p></noscript>
    <p>Connecting…</p>
</div>

<div id="closed" class="scene">
    <p>Disconnected</p>
    <button class="large" onclick="location.reload()">↻</button>
</div>

<div id="pad" class="scene touch-input mouse-input keyboard-input allow-fullscreen">
    <p class="background">Touchpad</p>
    <button class="top left" onclick="app.showKeys()">≡</button>
    <button class="top right" onclick="app.showSystemControls()">⚙</button>
    <button class="bottom left visible-if-fullscreen-enabled" onclick="app.toggleFullscreen()">⤢</button>
    <button class="bottom right" onclick="app.showTextInput()">⌨</button>
</div>

<div id="text-input" class="scene">
    <textarea class="grow" cols=1 rows=1></textarea>
    <div class="buttons">
        <button onclick="app.showKeys('text-input', 1)">≡</button>
        <button class="grow" id="send-text" data-send-content="➣" data-back-content="⯇"></button>
    </div>
</div>

<div id="keys" class="scene touch-input mouse-input keyboard-input allow-fullscreen">
    <textarea id="keys-textarea" tabindex="-1"></textarea>
    <div class="page">
        <div class="buttons" style="grid-column: 1 / 4">
            <button onclick="app.key(app.KEY_LEFT)">←</button>
            <button onclick="app.key(app.KEY_SUPER)">🪟</button>
            <button onclick="app.key(app.KEY_RIGHT)">→</button>
        </div>
        <div class="buttons" style="grid-column: 1 / 4">
            <button onclick="app.key(app.KEY_MEDIA_PREV_TRACK)">⏮</button>
            <button onclick="app.key(app.KEY_MEDIA_PLAY_PAUSE)">⏯</button>
            <button onclick="app.key(app.KEY_MEDIA_NEXT_TRACK)">⏭</button>
        </div>
        <div class="buttons" style="grid-column: 1 / 4">
            <button onclick="app.key(app.KEY_VOLUME_DOWN)">🔉</button>
            <button onclick="app.key(app.KEY_VOLUME_MUTE)">🔇</button>
            <button onclick="app.key(app.KEY_VOLUME_UP)">🔊</button>
        </div>
    </div>
    <div class="page">
        <div class="buttons" style="grid-column: 1 / 4">
            <button onclick="app.key(app.KEY_BACK_SPACE)">⌫</button>
            <button onclick="app.key(app.KEY_RETURN)">⮠</button>
            <button onclick="app.key(app.KEY_DELETE)">⌦</button>
        </div>
        <div class="buttons" style="grid-column: 1 / 4">
            <button onclick="app.key(app.KEY_HOME)">⭰</button>
            <button onclick="app.key(app.KEY_UP)">↑</button>
            <button onclick="app.key(app.KEY_END)">⭲</button>
        </div>
        <div class="buttons" style="grid-column: 1 / 4">
            <button onclick="app.key(app.KEY_LEFT)">←</button>
            <button onclick="app.key(app.KEY_DOWN)">↓</button>
            <button onclick="app.key(app.KEY_RIGHT)">→</button>
        </div>
    </div>
    <div class="page">
        <button onclick="app.key(app.KEY_BACK_SPACE)">⌫</button>
        <button onclick="app.text(this.textContent)">/</button>
        <button onclick="app.text(this.textContent)">*</button>
        <button onclick="app.text(this.textContent)">-</button>

        <button style="grid-row: 2" onclick="app.text(this.textContent)">7</button>
        <button onclick="app.text(this.textContent)">8</button>
        <button onclick="app.text(this.textContent)">9</button>
        <button onclick="app.text(this.textContent)">+</button>

        <button style="grid-row: 3" onclick="app.text(this.textContent)">4</button>
        <button onclick="app.text(this.textContent)">5</button>
        <button onclick="app.text(this.textContent)">6</button>
        <button onclick="app.text(this.textContent)">=</button>

        <button style="grid-row: 4" onclick="app.text(this.textContent)">1</button>
        <button onclick="app.text(this.textContent)">2</button>
        <button onclick="app.text(this.textContent)">3</button>
        <button style="grid-row: 4 / 6; grid-column: 4" onclick="app.key(app.KEY_RETURN)">⮠</button>

        <button style="grid-row: 5; grid-column: 1 / 3" onclick="app.text(this.textContent)">0</button>
        <button onclick="app.text(this.textContent)"><script>document.write(Intl.NumberFormat().formatToParts(1.1).find(x => x.type === "decimal").value)</script></button>
    </div>
    <button class="top right" onclick="app.showSystemControls()">⚙</button>
    <button class="top left" onclick="app.focusKeyboard()">⌨</button>
</div>

<div id="mouse" class="scene keyboard-input allow-fullscreen">
    <p class="background">Mouse</p>
</div>

<div id="system-controls" class="scene touch-input mouse-input keyboard-input allow-fullscreen">
    <p class="background">System</p>
    <button class="top left" onclick="history.back()">⯇</button>
    <div style="display: flex; flex-direction: column; gap: 1.2rem; width: 85%; align-items: stretch;">
        <button style="height: 3.5rem; font-size: 1.1rem; width: 100%; font-family: sans-serif; display: flex; align-items: center; justify-content: center; gap: 0.5rem;" onclick="app.customAction('display-profiles')">🖥️ Profiles</button>
        
        <!-- Timer Sleep Button -->
        <button style="height: 3.5rem; font-size: 1.1rem; width: 100%; font-family: sans-serif; display: flex; align-items: center; justify-content: center; gap: 0.5rem;" onclick="app.openSleepTimerModal()">⏱️ Sleep Timer</button>

        <!-- Open MPV Button -->
        <button style="height: 3.5rem; font-size: 1.1rem; width: 100%; font-family: sans-serif; display: flex; align-items: center; justify-content: center; gap: 0.5rem;" onclick="app.customAction('open-mpv')">🎬 Open MPV</button>

        <button style="height: 3.5rem; font-size: 1.1rem; width: 100%; font-family: sans-serif; background-color: #8b0000; border-color: #ff0000; display: flex; align-items: center; justify-content: center; gap: 0.5rem;" onclick="app.customAction('sleep')">⏻ Sleep</button>
    </div>

    <!-- Sleep Timer Modal overlay -->
    <div id="sleep-timer-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: #252526; border: 1px solid #444; border-radius: 0.75rem; padding: 1.5rem; width: 80%; max-width: 320px; display: flex; flex-direction: column; gap: 1.2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-family: sans-serif;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3c3c3c; padding-bottom: 0.5rem;">
                <span style="color: #fff; font-size: 1.1rem; font-weight: bold;">⏱️ Sleep Timer</span>
                <button style="background: none; border: none; color: #aaa; font-size: 1.2rem; cursor: pointer; padding: 0 0.2rem;" onclick="app.closeSleepTimerModal()">✕</button>
            </div>
            
            <div style="color: #bbb; text-align: center; font-size: 0.95rem;">Select duration:</div>
            
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem;">
                <button id="timer-btn-15" style="height: 3rem; background: #333; border: 1px solid #555; color: #fff; border-radius: 0.4rem; font-size: 1.1rem; font-weight: bold;" onclick="app.selectTimerPreset(15)">15</button>
                <button id="timer-btn-30" style="height: 3rem; background: #2a2a2a; border: 2px solid #007acc; color: #fff; border-radius: 0.4rem; font-size: 1.1rem; font-weight: bold;" onclick="app.selectTimerPreset(30)">30</button>
                <button id="timer-btn-45" style="height: 3rem; background: #333; border: 1px solid #555; color: #fff; border-radius: 0.4rem; font-size: 1.1rem; font-weight: bold;" onclick="app.selectTimerPreset(45)">45</button>
                <button id="timer-btn-60" style="height: 3rem; background: #333; border: 1px solid #555; color: #fff; border-radius: 0.4rem; font-size: 1.1rem; font-weight: bold;" onclick="app.selectTimerPreset(60)">60</button>
            </div>

            <div style="text-align: center; color: #007acc; font-size: 1.3rem; font-weight: bold; margin: 0.2rem 0;">
                Selected: <span id="selected-timer-val">30</span> min
            </div>

            <div style="display: flex; gap: 0.75rem; margin-top: 0.5rem; border-top: 1px solid #3c3c3c; padding-top: 1rem;">
                <button style="flex: 1; height: 2.8rem; background: #2e7d32; border: none; color: #fff; border-radius: 0.4rem; font-weight: bold; font-size: 1rem;" onclick="app.confirmSleepTimer()">Confirm</button>
                <button style="flex: 1; height: 2.8rem; background: #c62828; border: none; color: #fff; border-radius: 0.4rem; font-weight: bold; font-size: 1rem;" onclick="app.customAction('cancel-sleep-timer'); app.closeSleepTimerModal();">Cancel Timer</button>
            </div>
        </div>
    </div>
</div>
